name: Build e Deploy para Hostnet via FTP

# IMPORTANTE: para este workflow rodar, mova este arquivo para:
#   .github/workflows/deploy.yml
# Depois configure os secrets FTP_SERVER, FTP_USERNAME e FTP_PASSWORD
# em Settings → Secrets and variables → Actions no GitHub.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm install

      - name: Gerar build estático (pasta dist/)
        run: npm run build:static

      - name: Enviar dist/ para a Hostnet via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /www/
